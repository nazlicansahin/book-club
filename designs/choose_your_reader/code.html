<style>

<script>
        // Star background generation
        const starField = document.getElementById('star-field');
        const starCount = 60;

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.animationDelay = `${Math.random() * 2}s`;
            starField.appendChild(star);
        }

        // Card Selection Logic
        const cards = document.querySelectorAll('.character-card');
        cards.forEach(card => {
            card.addEventListener('click', () => {
                // Remove active classes from all
                cards.forEach(c => {
                    c.classList.remove('gold-border', 'pixel-card-shadow-active', 'active-selection');
                    c.classList.add('pixel-card-shadow');
                    
                    // Reset internal label color
                    const labelDiv = c.querySelector('.p-sm:last-child');
                    if (labelDiv) {
                        labelDiv.classList.remove('bg-tertiary-container');
                        labelDiv.classList.add('bg-black/20');
                        const spans = labelDiv.querySelectorAll('span');
                        spans[0].className = "text-label-lg font-label-lg text-on-surface uppercase block";
                        spans[1].className = "text-label-sm font-label-sm text-secondary uppercase block mt-unit";
                    }
                    
                    // Remove internal indicator
                    const existingIndicator = c.querySelector('.animate-pulse');
                    if (existingIndicator) existingIndicator.remove();
                });

                // Add active classes to selected
                card.classList.add('gold-border', 'pixel-card-shadow-active', 'active-selection');
                card.classList.remove('pixel-card-shadow');

                // Update label colors for selected
                const labelDiv = card.querySelector('.p-sm:last-child');
                if (labelDiv) {
                    labelDiv.classList.remove('bg-black/20');
                    labelDiv.classList.add('bg-tertiary-container');
                    const spans = labelDiv.querySelectorAll('span');
                    spans[0].className = "text-label-lg font-label-lg text-on-tertiary-container uppercase block";
                    spans[1].className = "text-label-sm font-label-sm text-on-tertiary-fixed-variant uppercase block mt-unit";
                }

                // Add indicator
                const imgContainer = card.querySelector('.bg-surface-dim');
                const indicator = document.createElement('div');
                indicator.className = 'absolute top-2 left-2 w-4 h-4 bg-tertiary-container animate-pulse';
                imgContainer.appendChild(indicator);
            });
        });
    </script>
